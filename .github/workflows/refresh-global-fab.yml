name: Refresh global floating action button

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/refresh-global-fab.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh legal script on every HTML page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = '20260723-6'
          changed = []
          for path in Path('.').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(r'/legal\.js\?v=[^"\']+', f'/legal.js?v={version}', text)
              if count == 0 and '</body>' in updated:
                  updated = updated.replace('</body>', f'<script src="/legal.js?v={version}"></script></body>', 1)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))
          print(f'Updated {len(changed)} HTML files')
          for item in changed:
              print(item)
          PY
      - name: Commit refreshed pages
        run: |
          if git diff --quiet; then
            echo 'No changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add '*.html' '**/*.html'
          git commit -m 'Обновить плавающую кнопку на всех страницах [skip ci]'
          git push
