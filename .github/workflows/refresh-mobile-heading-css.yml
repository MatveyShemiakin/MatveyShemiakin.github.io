name: Refresh mobile heading CSS

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/refresh-mobile-heading-css.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh mobile stylesheet version on home pages
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = '20260723-3'
          changed = []
          for name in ('index.html', 'en/index.html'):
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              updated = re.sub(r'/mobile-fix\.css\?v=[^"\']+', f'/mobile-fix.css?v={version}', text)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(name)
          print('Updated:', ', '.join(changed) or 'none')
          PY
      - name: Commit refreshed home pages
        run: |
          if git diff --quiet; then
            echo 'No changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html en/index.html
          git commit -m 'Обновить мобильную типографику главной [skip ci]'
          git push
