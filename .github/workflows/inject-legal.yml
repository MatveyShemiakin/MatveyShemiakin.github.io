name: Inject legal and professional modules

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'legal.js'
      - 'legal.css'
      - 'doctors-legal.js'
      - 'doctors-legal.css'
      - 'privacy.html'
      - 'en/privacy.html'
      - 'for-doctors/professional-use.html'
      - 'en/for-doctors/professional-use.html'
      - 'scripts/inject_legal.py'
      - '.github/workflows/inject-legal.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/inject_legal.py
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' '**/*.html' sitemap.xml || true
          git commit -m "Inject privacy and professional safeguards across site"
          git push
