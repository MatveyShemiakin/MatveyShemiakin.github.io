name: Clinical AI checks

on:
  pull_request:
    paths:
      - "doctors/**"
      - "preview/**"
      - "backend/**"
      - "tests/**"
      - "docs/clinical-navigator/**"
      - ".github/workflows/clinical-navigator-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Check JavaScript syntax
        run: |
          node --check doctors/clinical-ai/config.js
          node --check doctors/clinical-ai/app.js
          node --check tests/clinical-ai-vertical-e2e.mjs
          node --check doctors/navigator/modules.js
          node --check doctors/navigator/app-v2.js
          node --check doctors/navigator/ai-config.js
          node --check doctors/navigator/smart-intake.js
          node --check doctors/navigator/options-ui.js
          node --check tests/clinical-navigator-e2e.mjs
          cd backend
          npm run check --silent

      - name: Run backend tests
        run: |
          cd backend
          npm test --silent

      - name: Check vertical slice contract
        run: |
          test -f backend/src/analyze-case.mjs
          test -f doctors/clinical-ai/index.html
          test -f doctors/clinical-ai/app.js
          test -f doctors/clinical-ai/styles.css
          test -f doctors/clinical-ai/config.js
          test -f preview/clinical-ai/index.html
          test -f tests/clinical-ai-vertical-e2e.mjs
          grep -q "analyze_case" backend/src/handler.mjs
          grep -q "final_decision_owner: 'physician'" backend/src/analyze-case.mjs
          grep -q "action: 'analyze_case'" doctors/clinical-ai/app.js
          grep -q "Модель предложит варианты" doctors/clinical-ai/index.html
          if grep -q "suggestion-chip" doctors/clinical-ai/index.html doctors/clinical-ai/app.js; then
            echo "Legacy questionnaire leaked into the clean vertical slice"
            exit 1
          fi

      - name: Check provider-neutral backend
        run: |
          test -f backend/src/providers.mjs
          test -f backend/src/option-providers.mjs
          test -f backend/src/yandex-auth.mjs
          test -f backend/src/clinical-options-schema.mjs
          test -f backend/src/generate-clinical-options.mjs
          test -f backend/src/knowledge-retrieval.mjs
          grep -q "YANDEX_IAM_TOKEN" backend/src/yandex-auth.mjs
          grep -q "runtimeEnvironment" backend/src/handler.mjs
          grep -q "OPENAI_API_KEY" backend/src/providers.mjs
          grep -q "OPENAI_API_KEY" backend/src/option-providers.mjs
          grep -q "selected !== false" backend/src/generate-clinical-options.mjs

      - name: Check evidence package and safety locks
        run: |
          test -f backend/knowledge/pathologies/anterior-uveitis/manifest.json
          test -f backend/knowledge/pathologies/anterior-uveitis/evidence.json
          grep -q '"prewritten_final_answer": false' backend/knowledge/pathologies/anterior-uveitis/manifest.json
          grep -q '"model_may_select_final_treatment": false' backend/knowledge/pathologies/anterior-uveitis/manifest.json
          grep -q '"activation": "draft_locked"' backend/knowledge/pathologies/anterior-uveitis/evidence.json
          grep -q "ALLOW_DRAFT_CLINICAL_OPTIONS" backend/src/handler.mjs

      - name: Parse HTML
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for path in [
              Path('doctors/clinical-ai/index.html'),
              Path('preview/clinical-ai/index.html'),
              Path('doctors/navigator/index.html'),
              Path('preview/clinical-navigator/index.html'),
          ]:
              parser = Parser()
              parser.feed(path.read_text(encoding='utf-8'))
              parser.close()
              print(f'Parsed {path}')
          PY

      - name: Prevent accidental API secrets
        run: |
          if grep -RInE 'sk-[A-Za-z0-9_-]{20,}|AQVN[A-Za-z0-9_-]{20,}|(OPENAI|YANDEX|AI)_API_KEY[[:space:]]*=[[:space:]]*[^<[:space:]]+' doctors backend docs/clinical-navigator; then
            echo "Potential secret detected"
            exit 1
          fi

      - name: Install browser runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Run clean vertical slice browser test
        run: node tests/clinical-ai-vertical-e2e.mjs

      - name: Keep legacy preview regression test green
        run: node tests/clinical-navigator-e2e.mjs

      - name: Build Yandex Cloud deployment archive
        run: |
          rm -rf dist/clinical-navigator-api
          mkdir -p dist/clinical-navigator-api
          cp backend/package.json dist/clinical-navigator-api/package.json
          cp -R backend/src dist/clinical-navigator-api/src
          cp -R backend/knowledge dist/clinical-navigator-api/knowledge
          cat > dist/clinical-navigator-api/index.js <<'EOF'
          export { handler } from './src/handler.mjs';
          EOF
          node --check dist/clinical-navigator-api/index.js
          cd dist/clinical-navigator-api
          zip -qr ../clinical-ai-yandex.zip .
          cd ..
          unzip -l clinical-ai-yandex.zip

      - name: Upload Yandex Cloud deployment archive
        uses: actions/upload-artifact@v4
        with:
          name: clinical-ai-yandex
          path: dist/clinical-ai-yandex.zip
          if-no-files-found: error
          retention-days: 14
